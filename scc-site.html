<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sleep Cycle Center — Site Direction</title>
<style>
  :root{
    --ink:#0d0d0d; --paper:#fbfbfa; --line:#e9e9e6; --mut:#8a8a85; --soft:#f0f0ee;
    --navy:#0E314C;
    --sans:"Helvetica Neue",Inter,Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:#cfcfcf;color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
  .frame{position:fixed;inset:16px;border:1px solid var(--line);border-radius:18px;background:var(--paper);overflow:hidden}
  .grid{position:absolute;inset:0;pointer-events:none;display:grid;grid-template-columns:repeat(6,1fr);opacity:.6}
  .grid span{border-right:1px solid var(--line)}
  .grid span:last-child{border-right:none}

  header{position:absolute;top:0;left:0;right:0;height:78px;display:flex;align-items:center;gap:34px;padding:0 34px;z-index:8}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--ink);flex:none}
  .label{font-size:13px;font-weight:700;color:var(--ink)}
  .label span{display:block;color:var(--mut);font-weight:500;font-size:12px}

  .byline{position:absolute;left:30px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;font-size:11px;letter-spacing:.03em;color:var(--mut);z-index:8;max-height:60%}
  .byline b{color:var(--ink);font-weight:700}

  .rlabel{position:absolute;right:30px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;font-size:11px;color:var(--mut);z-index:8}

  .stage{position:absolute;inset:78px 34px 70px 70px}
  .art{width:100%;height:100%;border:0;border-radius:10px;background:#fff;box-shadow:0 8px 34px rgba(0,0,0,.07)}

  footer{position:absolute;left:34px;right:34px;bottom:18px;display:flex;align-items:center;gap:18px;z-index:8}
  .lang{font-size:12px;font-weight:700}
  .hint{margin-left:auto;font-size:11px;color:var(--mut)}
</style>
</head>
<body>

<div class="frame">
  <div class="grid"><span></span><span></span><span></span><span></span><span></span><span></span></div>

  <header>
    <span class="dot"></span>
    <div class="label">Sleep Cycle Center<span>Site direction</span></div>
  </header>

  <div class="byline">Designed by <b>Justin Moss</b> &nbsp; Security and AI subject matter expert, project management</div>
  <div class="rlabel">Sleep Cycle Review</div>

  <div class="stage">
    <iframe class="art" src="sleep-cycle-center.html" title="Sleep Cycle Center"></iframe>
  </div>

  <footer>
    <span class="lang">En</span>
    <span class="hint">Sleep Cycle Center — Site direction by Justin Moss</span>
  </footer>
</div>

</body>
</html>
